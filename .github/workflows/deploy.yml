name: Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Deploy
        run: |
          npm ci
          npm run build
          sudo rsync -av --delete dist/ /var/www/quantum-framework/dist/
          sudo systemctl restart nginx
